server:
  host: 0.0.0.0
  port: 8080
  data_root: /app/data
  log_level: INFO

redis:
  enabled: true
  uri: redis://redis:6379/0
  max_connections: 200
  socket_timeout_seconds: 30
  connect_timeout_seconds: 10
  retry_attempts: 3

object_storage:
  enabled: true
  provider: minio
  endpoint: minio:9000
  bucket: multimodal-kb
  prefix: knowledge_bases
  access_key_env: MINIO_ACCESS_KEY_ID
  secret_key_env: MINIO_SECRET_ACCESS_KEY
  secure: false
  region:
  upload_inputs: true
  upload_outputs: true
  preserve_local_inputs: false
  preserve_local_outputs: false

parser_service:
  enabled: true
  provider: remote_mineru
  base_url: http://mineru-parser-service:8090
  api_key_env: MINERU_PARSER_API_KEY
  connect_timeout_seconds: 10
  read_timeout_seconds: 1800
  default_backend: pipeline
  default_source: local
  default_device:
  healthcheck_enabled: true

models:
  llm:
    provider: openai_compatible
    enabled: true
    model: /nfs/aihub_modelcenter/models/39/59a4698c-9c4f-11f0-9f11-4a7e4d9e050f
    base_url: http://192.168.11.18:30211/v1
    api_key_env: OPENAI_API_KEY
    timeout_seconds: 180
    client_configs: {}
    extra_body: {}
  vision:
    provider: openai_compatible
    enabled: true
    model: Qwen3-VL-8B-Instruct
    base_url: http://192.168.11.18:30218/v1
    api_key_env: OPENAI_API_KEY
    timeout_seconds: 180
    client_configs: {}
    extra_body: {}
  embedding:
    provider: openai_compatible
    enabled: true
    model: BAAI/bge-m3
    base_url: http://192.168.16.36:8081/v1
    api_key_env: EMBEDDING_API_KEY
    api_key_optional: true
    placeholder_api_key: EMPTY
    dimension: 1024
    max_token_size: 8192
    timeout_seconds: 120
    client_configs: {}

rag_anything:
  parser: remote_mineru
  parse_method: auto
  parser_output_dir: output
  display_content_stats: true
  enable_image_processing: true
  enable_table_processing: true
  enable_equation_processing: true
  max_concurrent_files: 1
  context_window: 1
  context_mode: page
  max_context_tokens: 2000
  include_headers: true
  include_captions: true
  context_filter_content_types:
    - text
  content_format: minerU
  use_full_path: false

light_rag:
  init_kwargs:
    kv_storage: RedisKVStorage
    vector_storage: QdrantVectorDBStorage
    graph_storage: Neo4JStorage
    doc_status_storage: RedisDocStatusStorage
    cosine_better_than_threshold: 0.2
  query_defaults:
    mode: hybrid
    top_k: 20
    chunk_top_k: 10
    vlm_enhanced: true
